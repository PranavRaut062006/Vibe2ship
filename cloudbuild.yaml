steps:
  # 1. Build Backend Docker Image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/lifepilot-backend:$COMMIT_SHA', './server']

  # 2. Push Backend Docker Image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/lifepilot-backend:$COMMIT_SHA']

  # 3. Deploy Backend Service to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'lifepilot-backend'
      - '--image=gcr.io/$PROJECT_ID/lifepilot-backend:$COMMIT_SHA'
      - '--region=_DEPLOY_REGION'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--set-env-vars=GEMINI_API_KEY=_GEMINI_API_KEY,FIREBASE_PROJECT_ID=_FIREBASE_PROJECT_ID,FIREBASE_CLIENT_EMAIL=_FIREBASE_CLIENT_EMAIL'

  # 4. Build Frontend Docker Image (injecting Backend API URL & Firebase variables as build args)
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--build-arg'
      - 'NEXT_PUBLIC_API_URL=_NEXT_PUBLIC_API_URL'
      - '--build-arg'
      - 'NEXT_PUBLIC_GEMINI_API_KEY=_GEMINI_API_KEY'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_API_KEY=_FIREBASE_API_KEY'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=_FIREBASE_AUTH_DOMAIN'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_PROJECT_ID=_FIREBASE_PROJECT_ID'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=_FIREBASE_STORAGE_BUCKET'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=_FIREBASE_MESSAGING_SENDER_ID'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_APP_ID=_FIREBASE_APP_ID'
      - '-t'
      - 'gcr.io/$PROJECT_ID/lifepilot-frontend:$COMMIT_SHA'
      - '.'

  # 5. Push Frontend Docker Image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/lifepilot-frontend:$COMMIT_SHA']

  # 6. Deploy Frontend Service to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'lifepilot-frontend'
      - '--image=gcr.io/$PROJECT_ID/lifepilot-frontend:$COMMIT_SHA'
      - '--region=_DEPLOY_REGION'
      - '--platform=managed'
      - '--allow-unauthenticated'

substitutions:
  _DEPLOY_REGION: 'us-central1'
  _NEXT_PUBLIC_API_URL: 'https://lifepilot-backend-YOUR_PROJECT_ID.a.run.app'
  _GEMINI_API_KEY: 'YOUR_GEMINI_API_KEY'
  _FIREBASE_PROJECT_ID: 'YOUR_FIREBASE_PROJECT_ID'
  _FIREBASE_CLIENT_EMAIL: 'YOUR_FIREBASE_CLIENT_EMAIL'
  _FIREBASE_API_KEY: 'YOUR_FIREBASE_API_KEY'
  _FIREBASE_AUTH_DOMAIN: 'YOUR_FIREBASE_AUTH_DOMAIN'
  _FIREBASE_STORAGE_BUCKET: 'YOUR_FIREBASE_STORAGE_BUCKET'
  _FIREBASE_MESSAGING_SENDER_ID: 'YOUR_FIREBASE_MESSAGING_SENDER_ID'
  _FIREBASE_APP_ID: 'YOUR_FIREBASE_APP_ID'

images:
  - 'gcr.io/$PROJECT_ID/lifepilot-backend:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/lifepilot-frontend:$COMMIT_SHA'
